<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --accent-hover: #4facfe;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        body { 
            width: 320px; 
            padding: 15px; 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 { margin: 0; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .status { font-size: 11px; color: var(--accent); text-align: right; min-height: 18px; font-weight: 500; transition: color 0.3s; }

        .textarea-container {
            position: relative; width: 100%; height: 90px; margin-bottom: 5px;
        }
        .textarea-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-sizing: border-box; font-family: 'Fira Code', monospace; font-size: 11px;
            padding: 10px; border-radius: 8px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; overflow-x: hidden;
        }
        #textarea {
            color: transparent; background: transparent; caret-color: #fff; resize: none; z-index: 2;
            border: 1px solid var(--glass-border); transition: border 0.3s;
        }
        #textarea::placeholder { color: rgba(255,255,255,0.4); }
        #textarea:focus { outline: none; border-color: var(--accent); }
        
        #textarea-highlights {
            background: rgba(0, 0, 0, 0.3); color: #fff; z-index: 1; border: 1px solid transparent;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .ts-highlight {
            color: var(--accent); font-weight: bold; background: rgba(0, 242, 254, 0.15); border-radius: 2px; padding: 0 1px;
        }

        .btn-group { display: flex; gap: 8px; }
        
        button { 
            flex: 1; padding: 8px; cursor: pointer; border: 1px solid var(--glass-border); 
            border-radius: 6px; background: var(--glass-bg); color: #fff; 
            font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
            backdrop-filter: blur(4px); transition: all 0.2s ease;
            display: flex; justify-content: center; align-items: center; gap: 4px;
        }
        button:hover { 
            background: rgba(255, 255, 255, 0.15); 
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        button:active { transform: translateY(1px); }

        select { 
            width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--glass-border); 
            font-size: 12px; background: rgba(0, 0, 0, 0.4); color: #fff; 
            appearance: none; cursor: pointer; outline: none;
        }
        select option { background: #24243e; color: #fff; }

        .list { 
            max-height: 220px; overflow-y: auto; border: 1px solid var(--glass-border); 
            border-radius: 8px; background: rgba(0,0,0,0.2); 
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .item { 
            padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-between; cursor: pointer; 
            font-size: 12px; transition: all 0.2s; position: relative;
        }
        .item:last-child { border-bottom: none; }
        .item:hover { background: rgba(255,255,255,0.08); padding-left: 16px; }
        
        .item.active { 
            font-weight: 700; background: rgba(0, 242, 254, 0.1); color: var(--accent); 
            border-left: 4px solid var(--accent); padding-left: 16px;
            box-shadow: inset 20px 0 20px -20px var(--accent);
        }
        .item .time { opacity: 0.8; font-family: monospace; font-size: 11px; }

        .settings-toggle {
            text-align: center; cursor: pointer; font-size: 12px; 
            color: var(--text-muted); transition: color 0.2s;
            margin-top: 4px;
        }
        .settings-toggle:hover { color: #fff; }

        .settings { 
            display: none; padding-top: 12px; margin-top: 4px; 
            border-top: 1px solid var(--glass-border);
            animation: fadeIn 0.3s;
        }
        .settings.open { display: block; }
        .settings label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; display: block; }
        .settings input { 
            width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 8px; 
            font-size: 11px; border: 1px solid var(--glass-border); border-radius: 6px; 
            background: rgba(0, 0, 0, 0.3); color: #fff;
        }
        .settings input:focus { outline: none; border-color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h2>⏱ Skipper</h2>
        <div class="status" id="status">Connecting...</div>
    </div>
    
    <div class="textarea-container">
        <div id="textarea-highlights" class="textarea-layer" aria-hidden="true"></div>
        <textarea id="textarea" class="textarea-layer" spellcheck="false" placeholder="Timestamps&#10;(Alt+X on video to capture)"></textarea>
    </div>
    
    <div class="btn-group">
        <button id="btn-copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy
        </button>
        <button id="btn-save" title="Save to Database">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Save 
        </button>
        <button id="btn-load" title="Load from Database">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Load 
        </button>
    </div>
    
    <select id="mode">
        <option value="normal">▶ Normal Playback</option>
        <option value="loop">🔁 Auto-Loop Chapters</option>
    </select>
    
    <div class="list" id="list"></div>
    
    <div class="settings-toggle" id="btn-toggle-settings">
        ⚙️ Toggle Turso Settings
    </div>
    
    <div class="settings" id="settings-panel">
        <label>Database Config</label>
        <input type="text" id="turso-url" placeholder="Turso DB URL (https://...)">
        <input type="password" id="turso-token" placeholder="Authentication Token">
        <button id="btn-save-settings" style="width: 100%; margin-top: 4px;">Save & Validate Credentials</button>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
